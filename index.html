<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交流发电机 - 供小欧上课演示</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e9ecef;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            color: #333;
        }
        h1 { 
            color: #2c3e50; 
            font-size: 1.5rem; 
            margin-bottom: 10px; 
            text-align: center;
        }
        .container {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 850px;
            box-sizing: border-box;
        }
        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            flex: 1 1 110px;
            padding: 10px 8px;
            border: none;
            border-radius: 6px;
            background-color: #3498db;
            color: white;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        button:hover { background-color: #2980b9; }
        button.active { background-color: #e74c3c; box-shadow: inset 0 3px 5px rgba(0,0,0,0.2); }
        button.play-btn { background-color: #27ae60; flex-basis: 100%; font-size: 15px;}
        button.play-btn:hover { background-color: #2ecc71; }
        
        .options {
            text-align: center;
            margin-bottom: 15px;
            background: #fdfbf7;
            padding: 10px;
            border-radius: 6px;
            border: 1px dashed #e67e22;
        }
        .options label { cursor: pointer; font-weight: bold; color: #d35400; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .options input { transform: scale(1.2); }

        .panel {
            background: #f8f9fa;
            border-left: 4px solid #3498db;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .panel h3 { margin: 0 0 8px 0; color: #2c3e50; font-size: 1.1rem; }
        .panel p { margin: 0; color: #555; line-height: 1.5; font-size: 0.95rem; }
        
        canvas {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
            width: 100%;
            height: auto;
            max-width: 800px;
        }
        
        @media (min-width: 600px) {
            button.play-btn { flex-basis: auto; }
            .container { padding: 25px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <h1>交流发电机原理演示</h1>
    
    <div class="container">
        <div class="controls">
            <button id="btn-step1" onclick="setStep(1, 0)">阶段一: 0°</button>
            <button id="btn-step2" onclick="setStep(2, 90)">阶段二: 90°</button>
            <button id="btn-step3" onclick="setStep(3, 180)">阶段三: 180°</button>
            <button id="btn-step4" onclick="setStep(4, 270)">阶段四: 270°</button>
            <button id="btn-auto" class="play-btn" onclick="toggleAuto()">▶ 连续演示 (逆时针)</button>
        </div>

        <div class="options">
            <label>
                <input type="checkbox" id="showVectors" onchange="toggleVectors()"> 
                显示物理向量 (右手定则：红=速度，蓝=磁场，绿=电流)
            </label>
        </div>

        <div class="panel">
            <h3 id="desc-title">加载中...</h3>
            <p id="desc-text">加载中...</p>
        </div>

        <canvas id="genCanvas" width="800" height="580"></canvas>
    </div>

<script>
    const canvas = document.getElementById('genCanvas');
    const ctx = canvas.getContext('2d');
    
    let currentAngle = 0;
    let targetAngle = 0;
    let isAutoPlay = false;
    let showVectors = false;
    
    const descriptions = {
        1: { title: "阶段一：中性面 (0°)", text: "线圈与磁感线垂直。磁通量最大，但运动方向平行于磁场，<b>不切割磁感线</b>，感应电动势为 <b>0</b>。" },
        2: { title: "阶段二：平行面 (90°)", text: "线圈逆时针转到水平。左侧导线向屏幕外运动，右侧向屏幕内运动。根据<b>右手定则</b>，左侧电流<b>向上</b>，右侧电流<b>向下</b>，电压达最大值。" },
        3: { title: "阶段三：反转中性面 (180°)", text: "线圈再次与磁场垂直，切割速度降为 0，电流和电压回到 <b>0</b>。" },
        4: { title: "阶段四：反转平行面 (270°)", text: "线圈再次水平，但导线位置互换。原本在左侧的导线现在在右侧并向内运动，电流反向，达到<b>负向最大值</b>。" },
        auto: { title: "连续发电模式：正弦波", text: "逆时针连续圆周运动使得切割速度呈正弦规律变化，产生了交替方向的正弦交流电。" }
    };

    function setStep(step, angle) {
        isAutoPlay = false;
        targetAngle = angle;
        updateUI(step);
    }

    function toggleAuto() {
        isAutoPlay = !isAutoPlay;
        if(isAutoPlay) {
            updateUI('auto');
            document.getElementById('btn-auto').innerHTML = "⏸ 暂停演示";
        } else {
            targetAngle = currentAngle;
            document.getElementById('btn-auto').innerHTML = "▶ 连续演示 (逆时针)";
        }
    }

    function toggleVectors() {
        showVectors = document.getElementById('showVectors').checked;
    }

    function updateUI(activeStep) {
        for(let i=1; i<=4; i++) {
            document.getElementById(`btn-step${i}`).classList.remove('active');
        }
        if(activeStep !== 'auto' && activeStep >= 1 && activeStep <= 4) {
            document.getElementById(`btn-step${activeStep}`).classList.add('active');
        }
        document.getElementById('desc-title').innerHTML = descriptions[activeStep].title;
        document.getElementById('desc-text').innerHTML = descriptions[activeStep].text;
    }
    
    // 3D 投影
    const cx = 400, cy = 240;
    function project(x, y, z) {
        return { x: cx + x, y: cy + y - z * 0.3 }; // z 轴产生 0.3 的透视偏移
    }

    let historyData = [];

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (isAutoPlay) {
            currentAngle += 1.5; 
            if(currentAngle >= 360) currentAngle -= 360;
        } else {
            let diff = targetAngle - currentAngle;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            currentAngle += diff * 0.08; // 平滑过渡速度
        }

        const rad = currentAngle * Math.PI / 180;

        drawMagnetsAndField();
        drawCoil(rad);
        drawGraph(rad);

        requestAnimationFrame(draw);
    }

    function drawMagnetsAndField() {
        // N极
        ctx.fillStyle = '#e74c3c'; ctx.fillRect(50, 110, 100, 260);
        ctx.fillStyle = '#c0392b'; ctx.fillRect(150, 110, 20, 260);
        ctx.fillStyle = 'white'; ctx.font = 'bold 45px Arial'; ctx.fillText('N', 85, 250);

        // S极
        ctx.fillStyle = '#3498db'; ctx.fillRect(650, 110, 100, 260);
        ctx.fillStyle = '#2980b9'; ctx.fillRect(630, 110, 20, 260);
        ctx.fillStyle = 'white'; ctx.font = 'bold 45px Arial'; ctx.fillText('S', 680, 250);

        // 磁感线
        ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(52, 152, 219, 0.3)';
        for(let y = 150; y <= 330; y += 45) {
            ctx.beginPath(); ctx.moveTo(170, y); ctx.lineTo(630, y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(400, y); ctx.lineTo(390, y - 6); ctx.lineTo(390, y + 6);
            ctx.fillStyle = 'rgba(52, 152, 219, 0.5)'; ctx.fill();
        }
    }

    function drawArrow(x1, y1, x2, y2, color, label) {
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = 3;
        
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();

        const angle = Math.atan2(y2 - y1, x2 - x1);
        ctx.beginPath();
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - 12 * Math.cos(angle - Math.PI/6), y2 - 12 * Math.sin(angle - Math.PI/6));
        ctx.lineTo(x2 - 12 * Math.cos(angle + Math.PI/6), y2 - 12 * Math.sin(angle + Math.PI/6));
        ctx.fill();

        if (label) {
            ctx.font = 'bold 14px Arial';
            ctx.fillText(label, x2 + 5, y2 - 5);
        }
    }

    function drawCoil(rad) {
        const R = 130, H = 200;
        // 线圈 1 (起始时在前方) 和 线圈 2 (起始时在后方)
        // 逆时针旋转：角度增加，x = -R*sin(rad), z = R*cos(rad)
        let wires = [
            { id: 1, x: -R * Math.sin(rad), z: R * Math.cos(rad) },
            { id: 2, x: R * Math.sin(rad), z: -R * Math.cos(rad) }
        ];
        
        // 深度排序，先画后面的，实现 3D 遮挡
        wires.sort((a, b) => a.z - b.z);

        let p1 = project(wires[0].x, -H/2, wires[0].z); // 后方顶
        let p2 = project(wires[0].x, H/2, wires[0].z);  // 后方底
        let p3 = project(wires[1].x, H/2, wires[1].z);  // 前方底
        let p4 = project(wires[1].x, -H/2, wires[1].z); // 前方顶

        // 绘制半透明线圈面
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
        ctx.lineTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y); ctx.closePath();
        ctx.fillStyle = 'rgba(241, 196, 15, 0.1)'; ctx.fill();

        // 绘制线圈边框
        ctx.lineJoin = 'round';
        
        // 后方导线
        ctx.lineWidth = 5; ctx.strokeStyle = '#d35400';
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
        
        // 上下连接线
        ctx.lineWidth = 4; ctx.strokeStyle = '#e67e22';
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p4.x, p4.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y); ctx.stroke();
        
        // 前方导线
        ctx.lineWidth = 7; ctx.strokeStyle = '#f1c40f';
        ctx.beginPath(); ctx.moveTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y); ctx.stroke();

        // 计算物理方向的电流 (修正版)
        let emf = Math.sin(rad); 

        // 绘制电流动画箭头 (附着在导线上)
        if (Math.abs(emf) > 0.1) {
            drawCurrentArrows(wires[1], p4, p3, emf, true); // 前方导线
            drawCurrentArrows(wires[0], p1, p2, -emf, false); // 后方导线
        }

        // 绘制物理向量 (右手定则)
        if (showVectors) {
            // 我们始终在导线 1 的中心点绘制向量，方便观察
            let w1 = wires.find(w => w.id === 1);
            let centerP = project(w1.x, 0, w1.z);
            
            // 磁场 (向右)
            let bEnd = project(w1.x + 80, 0, w1.z);
            drawArrow(centerP.x, centerP.y, bEnd.x, bEnd.y, '#3498db', 'B (磁场)');

            // 速度 (切线方向，逆时针)
            let vx = -R * Math.cos(rad);
            let vz = -R * Math.sin(rad);
            // 归一化并放大向量长度用于显示
            let vLen = Math.sqrt(vx*vx + vz*vz);
            let vScale = 80 / vLen;
            let vEnd = project(w1.x + vx * vScale, 0, w1.z + vz * vScale);
            drawArrow(centerP.x, centerP.y, vEnd.x, vEnd.y, '#e74c3c', 'v (速度)');

            // 电流/受力 (向上或向下，取决于 sin)
            // 在画布中 Y 轴向下为正，所以用 -emf 表示向上的物理方向
            if (Math.abs(emf) > 0.1) {
                let iEnd = project(w1.x, -emf * 80, w1.z);
                drawArrow(centerP.x, centerP.y, iEnd.x, iEnd.y, '#2ecc71', 'I (电流)');
            }
        }
    }

    function drawCurrentArrows(wireObj, pt, pb, emf, isFront) {
        // 判断电流在屏幕上的绝对上下方向
        // 当 emf 为正 (例如 90度，线圈左侧)，根据右手定则，电流应向上流 (负 Y)
        // emf 代表线圈 1 的相对电流。
        
        let midY = (pt.y + pb.y) / 2;
        let x = pt.x;
        
        // 修正逻辑：
        // 线圈 1 在左侧时 (sin > 0)，电流向上 (y 减小)
        // 线圈 1 在右侧时 (sin < 0)，电流向下 (y 增大)
        // 线圈 2 始终与线圈 1 相反。
        let dirMultiplier = (wireObj.id === 1) ? 1 : -1;
        
        // canvas 中 y 越小越靠上
        let directionY = emf * dirMultiplier > 0 ? -1 : 1; 
        
        let size = 10 + Math.abs(emf) * 10;
        
        ctx.beginPath();
        ctx.moveTo(x, midY - directionY * size);
        ctx.lineTo(x - size*0.5, midY + directionY * size*0.8);
        ctx.lineTo(x + size*0.5, midY + directionY * size*0.8);
        ctx.fillStyle = `rgba(46, 204, 113, ${0.4 + Math.abs(emf)*0.6})`;
        ctx.fill();
    }

    function drawGraph(rad) {
        const graphY = 480, amplitude = 60;
        let currentEMF = Math.sin(rad);
        historyData.unshift(currentEMF);
        if(historyData.length > 600) historyData.pop();

        // 基准线
        ctx.beginPath(); ctx.moveTo(100, graphY); ctx.lineTo(700, graphY);
        ctx.strokeStyle = '#bdc3c7'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle = '#7f8c8d'; ctx.font = '14px Arial'; ctx.fillText('感应电动势/电压 (V) = 0', 100, graphY - 12);

        // 正弦波
        ctx.beginPath(); ctx.moveTo(100, graphY - historyData[0] * amplitude);
        for(let i = 1; i < historyData.length; i++) {
            if(100 + i > 700) break;
            ctx.lineTo(100 + i, graphY - historyData[i] * amplitude);
        }
        ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 3; ctx.stroke();

        // 动态圆点
        ctx.beginPath(); ctx.arc(100, graphY - currentEMF * amplitude, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#e74c3c'; ctx.fill();
        ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
    }

    // 初始化
    updateUI(1);
    draw();
</script>
</body>
</html>
